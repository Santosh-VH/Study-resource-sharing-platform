
<!DOCTYPE html>
<html>
<head>
    <title>Study Resource Sharing Platform</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav>
    <h1>Study Resource Sharing Platform</h1>
</nav>

<div class="container">

    <div class="auth-box">
        <h2>User Login</h2>
        <input type="text" id="username" placeholder="Enter Username">
        <input type="password" id="password" placeholder="Enter Password">
        <button onclick="login()">Login</button>
    </div>

    <div class="upload-box">
        <h2>Upload Study Resource</h2>

        <input type="text" id="title" placeholder="Resource Title">
        <input type="text" id="subject" placeholder="Subject">
        <textarea id="description" placeholder="Description"></textarea>

        <input type="file" id="fileInput">

        <input type="text" id="link" placeholder="Useful Link">

        <button onclick="addResource()">Upload Resource</button>
    </div>

    <div class="search-box">
        <h2>Search Resources</h2>
        <input type="text" id="search" placeholder="Search by subject or keyword" onkeyup="searchResource()">
    </div>

    <div>
        <h2>Available Resources</h2>
        <div id="resourceList"></div>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
